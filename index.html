<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Collection">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Collection Tab Fix</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  min-height:100vh;
  background:#fff;
  color:#050505;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang TC","Noto Sans TC",sans-serif;
  padding:34px 22px;
}
.wrap{max-width:720px;margin:0 auto}
h1{
  text-align:center;
  font-size:76px;
  line-height:.9;
  font-weight:500;
  letter-spacing:-5px;
  margin:0;
}
.sub{
  text-align:center;
  color:#7d838c;
  font-size:24px;
  margin:24px 0 38px;
}
.tabs,.category-tabs{
  display:grid;
  gap:0;
  padding:6px;
  border:1px solid #dededb;
  border-radius:999px;
  background:#fff;
}
.tabs{grid-template-columns:1fr 1fr;margin-bottom:18px}

.tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:26px;
}
.category-tabs{grid-template-columns:1fr 1fr 1fr;margin-bottom:18px}
.tab,.category-tab{
  border:0;
  border-radius:999px;
  min-height:50px;
  background:transparent;
  color:#9ca3af;
  font-size:17px;
  font-weight:500;
}
.category-tab{min-height:44px;font-size:16px}
.tab.active,.category-tab.active{
  background:#050505;
  color:#fff;
}
.panel{display:none}
.panel.active{display:block}
.section{
  border:1px solid #e5e5e1;
  border-radius:30px;
  padding:18px;
  margin-bottom:24px;
  background:#fff;
  box-shadow:0 8px 30px rgba(0,0,0,.04);
}
.card-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.text-card{
  border:1px solid #dededb;
  background:#fff;
  color:#222;
  border-radius:999px;
  min-height:42px;
  padding:0 18px;
  font-size:15px;
  font-weight:500;
  touch-action:manipulation;
}
.text-card.active{
  background:#050505;
  color:#fff;
  border-color:#050505;
}
.photo-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  align-items:center;
}
.photo-card{
  appearance:none;
  -webkit-appearance:none;
  padding:0;
  margin:0;
  border:0;
  width:100%;
  aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  background:#f1f1ee;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  touch-action:manipulation;
}
.photo-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
input,textarea,select{
  width:100%;
  border:1px solid #dededb;
  border-radius:22px;
  padding:16px 18px;
  font-size:17px;
  outline:none;
  background:#fff;
  color:#050505;
  margin-bottom:14px;
}
textarea{min-height:120px;resize:none;line-height:1.5}
.btn{
  width:100%;
  border:1px solid #dededb;
  border-radius:999px;
  min-height:54px;
  background:#050505;
  color:#fff;
  font-size:17px;
  font-weight:500;
}
.btn.light{background:#fff;color:#050505}
.btn.danger{background:#fff1f2;color:#991b1b;border-color:#fecaca}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{color:#9ca3af;text-align:center;padding:24px 8px;font-size:16px}
.hint{color:#7d838c;line-height:1.7;font-size:14px;margin-top:14px}
.toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  background:#050505;
  color:#fff;
  border-radius:999px;
  padding:12px 20px;
  display:none;
  z-index:99;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.28);
  display:none;
  align-items:flex-end;
  z-index:50;
  backdrop-filter:blur(8px);
}
.sheet{
  width:100%;
  background:#fff;
  border-radius:30px 30px 0 0;
  padding:22px 18px 28px;
  max-height:88vh;
  overflow:auto;
}
.sheet h2{margin:0 0 18px;font-size:28px;font-weight:500;color:#050505}
</style>
</head>

<body>
<div class="wrap">
  <h1>Collection</h1>
  <div class="sub">Save text. Share images.</div><div style="text-align:center;color:#9ca3af;font-size:12px;margin:-26px 0 28px;">版本：PhotoGrid V3</div>

  <div class="tabs">
    <button type="button" id="tabText" class="tab active">文字</button>
    <button type="button" id="tabPhoto" class="tab">圖片</button>
  </div>




  <div id="backupBox" class="section" style="display:none;">
    <label>備份代碼</label>
    <textarea id="backupCode" readonly style="min-height:180px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;"></textarea>
    <button type="button" id="copyBackupBtn" class="btn" style="margin-top:12px;">複製備份代碼</button>
    <div class="hint">請把這段代碼自行貼到備忘錄、iCloud 檔案或其他地方保存。</div>
  </div>

  <div id="restoreBox" class="section" style="display:none;">
    <label>貼上備份代碼</label>
    <textarea id="restoreCode" style="min-height:180px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;"></textarea>
    <button type="button" id="restoreBtn" class="btn" style="margin-top:12px;">還原資料</button>
  </div>

  <section id="panelText" class="panel active">
    <div class="section">
      <div class="category-tabs">
        <button type="button" class="category-tab active" data-cat="code">程式碼</button>
        <button type="button" class="category-tab" data-cat="hello">招呼碼</button>
        <button type="button" class="category-tab" data-cat="dialog">對話碼</button>
      </div>
      <div id="textList" class="card-list"></div>
      <div id="textEmpty" class="empty">此類別尚未建立文字卡片</div>
      <div class="hint">點一下複製，長按 0.6 秒可修改 / 刪除 / 排序。</div>
    </div>

    <div class="section">
      <select id="newTextCategory">
        <option value="code">程式碼</option>
        <option value="hello">招呼碼</option>
        <option value="dialog">對話碼</option>
      </select>
      <input id="newTextTitle" placeholder="輸入標題">
      <textarea id="newTextBody" placeholder="輸入長文字內容"></textarea>

      <button type="button" id="addTextBtn" class="btn">新增文字卡片</button>
    </div>

    <div class="section">
      <div class="tools" style="grid-template-columns:1fr 1fr 1fr;">
        <button type="button" id="exportBtn" class="btn light" style="min-height:46px;font-size:15px;">備份</button>
        <button type="button" id="importBtn" class="btn light" style="min-height:46px;font-size:15px;">還原</button>
        <button type="button" id="clearAllBtn" class="btn danger" style="min-height:46px;font-size:15px;">清空</button>
      </div>

      <div class="hint" style="margin-top:14px;">
        備份可複製保存，未來貼回即可完整還原。
      </div>
    </div>
  </section>

  <section id="panelPhoto" class="panel">
    <div class="section">
      <div id="photoList" class="photo-row"></div>
      <div id="photoEmpty" class="empty">尚未加入圖片</div>
      <div class="hint">點一下圖片分享，長按 0.6 秒可刪除 / 排序。</div>
    </div>

    <div class="section">
      <input id="photoInput" type="file" accept="image/*" multiple style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">
      <button type="button" id="addPhotoBtn" class="btn">加入照片</button>
    </div>
  </section>
</div>

<div id="toast" class="toast">完成</div>

<div id="textManageModal" class="modal">
  <div class="sheet">
    <h2 id="textManageTitle">管理文字卡片</h2>
    <div class="row">
      <button type="button" id="editTextBtn" class="btn">修改</button>
      <button type="button" id="deleteTextBtn" class="btn danger">刪除</button>
    </div>
    <br>
    <div class="row">
      <button type="button" id="textPrevBtn" class="btn light">往前</button>
      <button type="button" id="textNextBtn" class="btn light">往後</button>
    </div>
    <br>
    <button type="button" class="btn light closeModal">取消</button>
  </div>
</div>

<div id="editTextModal" class="modal">
  <div class="sheet">
    <h2>修改文字卡片</h2>
    <select id="editTextCategory">
      <option value="code">程式碼</option>
      <option value="hello">招呼碼</option>
      <option value="dialog">對話碼</option>
    </select>
    <input id="editTextTitle" placeholder="標題">
    <textarea id="editTextBody" placeholder="內容"></textarea>
    <button type="button" id="saveEditTextBtn" class="btn">儲存修改</button>
    <br><br>
    <button type="button" class="btn light closeModal">取消</button>
  </div>
</div>

<div id="photoManageModal" class="modal">
  <div class="sheet">
    <h2>管理圖片</h2>
    <div class="row">
      <button type="button" id="photoPrevBtn" class="btn light">往前</button>
      <button type="button" id="photoNextBtn" class="btn light">往後</button>
    </div>
    <br>
    <button type="button" id="deletePhotoBtn" class="btn danger">刪除圖片</button>
    <br><br>
    <button type="button" class="btn light closeModal">取消</button>
  </div>
</div>


<div id="clearAllModal" class="modal">
  <div class="sheet">
    <h2>清除全部資料</h2>
    <div class="hint" style="margin-bottom:18px;">
      此功能會刪除所有已儲存的文字卡片與照片。刪除後無法復原，請先備份再清除。
    </div>
    <button type="button" id="confirmClearAllBtn" class="btn danger">確定清除全部</button>
    <br><br>
    <button type="button" class="btn light closeModal">取消</button>
  </div>
</div>

<script>
(function(){
  const TEXT_KEY="collection_text_tabfix_v1";
  const PHOTO_KEY="collection_photo_tabfix_v1";

  let textCards=[];
  let photos=[];
  let activeCat="code";
  let currentTextId=null;
  let currentPhotoId=null;
  let pressTimer=null;
  let didLong=false;

  function load(){
    textCards = JSON.parse(localStorage.getItem(TEXT_KEY) || "null") || [
      {id:"t1",cat:"code",title:"123",body:"123"},
      {id:"t2",cat:"code",title:"345",body:"345"},
      {id:"t3",cat:"hello",title:"Hi",body:"Hi"},
      {id:"t4",cat:"dialog",title:"OK",body:"OK"}
    ];
    photos = JSON.parse(localStorage.getItem(PHOTO_KEY) || "[]");
  }

  function saveText(){localStorage.setItem(TEXT_KEY,JSON.stringify(textCards))}
  function savePhotos(){localStorage.setItem(PHOTO_KEY,JSON.stringify(photos))}

  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",1000);
  }

  function showPanel(type){
    document.getElementById("panelText").classList.toggle("active",type==="text");
    document.getElementById("panelPhoto").classList.toggle("active",type==="photo");
    document.getElementById("tabText").classList.toggle("active",type==="text");
    document.getElementById("tabPhoto").classList.toggle("active",type==="photo");
  }

  function bindPress(el,onLong,onTap){
    function start(){
      didLong=false;
      clearTimeout(pressTimer);
      pressTimer=setTimeout(()=>{
        didLong=true;
        if(navigator.vibrate) navigator.vibrate(25);
        onLong();
      },600);
    }
    function end(){
      clearTimeout(pressTimer);
      if(didLong){
        setTimeout(()=>didLong=false,0);
        return;
      }
      onTap();
    }
    el.addEventListener("touchstart",start,{passive:true});
    el.addEventListener("touchend",end);
    el.addEventListener("touchmove",()=>clearTimeout(pressTimer),{passive:true});
    el.addEventListener("mousedown",start);
    el.addEventListener("mouseup",end);
    el.addEventListener("mouseleave",()=>clearTimeout(pressTimer));
  }

  function renderText(){
    const list=document.getElementById("textList");
    const empty=document.getElementById("textEmpty");
    const items=textCards.filter(x=>x.cat===activeCat);
    list.innerHTML="";
    empty.style.display=items.length?"none":"block";

    items.forEach((item,index)=>{
      const btn=document.createElement("button");
      btn.type="button";
      btn.className="text-card"+(index===0?" active":"");
      btn.textContent=item.title;
      bindPress(btn,()=>openTextManage(item.id),()=>copyText(item.body,btn));
      list.appendChild(btn);
    });
  }

  function renderPhotos(){
    const list=document.getElementById("photoList");
    const empty=document.getElementById("photoEmpty");
    list.innerHTML="";
    empty.style.display=photos.length?"none":"block";

    photos.forEach(photo=>{
      const btn=document.createElement("button");
      btn.type="button";
      btn.className="photo-card";
      const img=document.createElement("img");
      img.src=photo.dataUrl;
      btn.appendChild(img);
      bindPress(btn,()=>openPhotoManage(photo.id),()=>sharePhoto(photo));
      list.appendChild(btn);
    });
  }

  async function copyText(text,btn){
    try{await navigator.clipboard.writeText(text)}
    catch(e){
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.style.position="fixed";
      ta.style.left="-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    document.querySelectorAll(".text-card").forEach(x=>x.classList.remove("active"));
    if(btn) btn.classList.add("active");
    toast("已複製");
  }

  function addText(){
    const cat=document.getElementById("newTextCategory").value;
    const title=document.getElementById("newTextTitle").value.trim();
    const body=document.getElementById("newTextBody").value.trim();
    if(!title||!body)return;

    textCards.unshift({id:"t"+Date.now(),cat,title,body});
    activeCat=cat;
    saveText();
    document.getElementById("newTextTitle").value="";
    document.getElementById("newTextBody").value="";
    updateCatUI();
    renderText();
    toast("已新增");
  }

  function openTextManage(id){
    currentTextId=id;
    const item=textCards.find(x=>x.id===id);
    document.getElementById("textManageTitle").textContent=item?item.title:"管理文字卡片";
    openModal("textManageModal");
  }

  function editText(){
    const item=textCards.find(x=>x.id===currentTextId);
    if(!item)return;
    document.getElementById("editTextCategory").value=item.cat;
    document.getElementById("editTextTitle").value=item.title;
    document.getElementById("editTextBody").value=item.body;
    closeModal("textManageModal");
    openModal("editTextModal");
  }

  function saveEditText(){
    const item=textCards.find(x=>x.id===currentTextId);
    if(!item)return;
    item.cat=document.getElementById("editTextCategory").value;
    item.title=document.getElementById("editTextTitle").value.trim();
    item.body=document.getElementById("editTextBody").value.trim();
    activeCat=item.cat;
    saveText();
    closeModal("editTextModal");
    updateCatUI();
    renderText();
    toast("已修改");
  }

  function deleteText(){
    textCards=textCards.filter(x=>x.id!==currentTextId);
    saveText();
    closeModal("textManageModal");
    renderText();
    toast("已刪除");
  }

  function moveText(direction){
    const index=textCards.findIndex(x=>x.id===currentTextId);
    if(index<0)return;
    const cat=textCards[index].cat;
    const same=textCards.map((x,i)=>({x,i})).filter(o=>o.x.cat===cat);
    const pos=same.findIndex(o=>o.x.id===currentTextId);
    const target=same[pos+direction];
    if(!target){toast(direction<0?"已在最前面":"已在最後面");return}
    const ti=target.i;
    [textCards[index],textCards[ti]]=[textCards[ti],textCards[index]];
    saveText();
    renderText();
    toast("已調整順序");
  }

  function addPhotos(event){
    const input = event.target;
    const files = Array.from(input.files || []);
    if(!files.length) return;

    let completed = 0;
    let added = 0;

    files.forEach(file=>{
      if(!file || !file.type || !file.type.startsWith("image/")){
        completed++;
        return;
      }

      const reader = new FileReader();

      reader.onload = ()=>{
        photos.unshift({
          id:"p"+Date.now()+"_"+Math.random().toString(36).slice(2),
          name:file.name || "image",
          type:file.type || "image/jpeg",
          dataUrl:reader.result
        });

        added++;
        completed++;

        if(completed === files.length){
          savePhotos();
          renderPhotos();
          input.value = "";
          toast("已加入照片");
        }
      };

      reader.onerror = ()=>{
        completed++;
        if(completed === files.length){
          savePhotos();
          renderPhotos();
          input.value = "";
        }
      };

      reader.readAsDataURL(file);
    });
  }

  async function sharePhoto(photo){
    try{
      const file=dataURLToFile(photo.dataUrl,photo.name,photo.type);
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
      }
    }catch(e){}
  }

  function dataURLToFile(dataUrl,filename,mimeType){
    const arr=dataUrl.split(",");
    const bstr=atob(arr[1]);
    let n=bstr.length;
    const u8arr=new Uint8Array(n);
    while(n--)u8arr[n]=bstr.charCodeAt(n);
    return new File([u8arr],filename,{type:mimeType});
  }

  function openPhotoManage(id){
    currentPhotoId=id;
    openModal("photoManageModal");
  }

  function deletePhoto(){
    photos=photos.filter(x=>x.id!==currentPhotoId);
    savePhotos();
    closeModal("photoManageModal");
    renderPhotos();
  }

  function movePhoto(direction){
    const index=photos.findIndex(x=>x.id===currentPhotoId);
    if(index<0)return;
    const target=index+direction;
    if(target<0||target>=photos.length){toast(direction<0?"已在最前面":"已在最後面");return}
    [photos[index],photos[target]]=[photos[target],photos[index]];
    savePhotos();
    renderPhotos();
    toast("已調整順序");
  }

  function openModal(id){document.getElementById(id).style.display="flex"}
  function closeModal(id){document.getElementById(id).style.display="none"}
  function closeAll(){document.querySelectorAll(".modal").forEach(m=>m.style.display="none")}

  function updateCatUI(){
    document.querySelectorAll(".category-tab").forEach(btn=>{
      btn.classList.toggle("active",btn.dataset.cat===activeCat);
    });
  }


  function exportData(){
    const data = {
      app:"Collection",
      version:1,
      exportedAt:new Date().toISOString(),
      textCards:textCards,
      photos:photos
    };

    const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));

    document.getElementById("backupBox").style.display = "block";
    document.getElementById("restoreBox").style.display = "none";
    document.getElementById("backupCode").value = code;

    toast("已產生備份代碼");
  }

  function showRestoreBox(){
    document.getElementById("restoreBox").style.display = "block";
    document.getElementById("backupBox").style.display = "none";
    toast("請貼上備份代碼");
  }

  function restoreFromCode(){
    const code = document.getElementById("restoreCode").value.trim();
    if(!code) return;

    try{
      const json = decodeURIComponent(escape(atob(code)));
      const data = JSON.parse(json);

      if(Array.isArray(data.textCards)){
        textCards = data.textCards;
      }

      if(Array.isArray(data.photos)){
        photos = data.photos;
      }

      saveText();
      savePhotos();

      activeCat = "code";
      updateCatUI();
      renderText();
      renderPhotos();

      document.getElementById("restoreCode").value = "";
      document.getElementById("restoreBox").style.display = "none";

      toast("已還原資料");
    }catch(e){
      toast("代碼無法還原");
    }
  }

  async function copyBackupCode(){
    const code = document.getElementById("backupCode").value;
    if(!code) return;

    try{
      await navigator.clipboard.writeText(code);
    }catch(e){
      const ta = document.getElementById("backupCode");
      ta.focus();
      ta.select();
      document.execCommand("copy");
    }

    toast("已複製備份代碼");
  }



  function clearAllData(){
    openModal("clearAllModal");
  }

  function confirmClearAllData(){
    textCards = [];
    photos = [];

    saveText();
    savePhotos();

    // 同步清除目前版本可能用到的 localStorage keys
    try{
      localStorage.removeItem("collection_text_tabfix_v1");
      localStorage.removeItem("collection_photo_tabfix_v1");
      localStorage.removeItem("collection_text_test_longpress_v1");
      localStorage.removeItem("collection_photo_test_longpress_v1");
    }catch(e){}

    activeCat = "code";
    updateCatUI();
    renderText();
    renderPhotos();

    const backupBox = document.getElementById("backupBox");
    const restoreBox = document.getElementById("restoreBox");

    if(backupBox) backupBox.style.display = "none";
    if(restoreBox) restoreBox.style.display = "none";

    closeModal("clearAllModal");
    toast("已清除全部文字與照片");
  }


  function bindUI(){
    document.getElementById("tabText").addEventListener("click",()=>showPanel("text"));
    document.getElementById("tabPhoto").addEventListener("click",()=>showPanel("photo"));

    document.querySelectorAll(".category-tab").forEach(btn=>{
      btn.addEventListener("click",()=>{
        activeCat=btn.dataset.cat;
        updateCatUI();
        renderText();
      });
    });

    document.getElementById("addTextBtn").addEventListener("click",addText);
    document.getElementById("addPhotoBtn").addEventListener("click",()=>{
      const input = document.getElementById("photoInput");
      if(input) input.click();
    });
    document.getElementById("photoInput").addEventListener("change",addPhotos);

    document.getElementById("exportBtn").addEventListener("click",exportData);
    document.getElementById("importBtn").addEventListener("click",showRestoreBox);
    document.getElementById("copyBackupBtn").addEventListener("click",copyBackupCode);
    document.getElementById("restoreBtn").addEventListener("click",restoreFromCode);
    document.getElementById("clearAllBtn").addEventListener("click",clearAllData);
    document.getElementById("confirmClearAllBtn").addEventListener("click",confirmClearAllData);

    document.getElementById("editTextBtn").addEventListener("click",editText);
    document.getElementById("deleteTextBtn").addEventListener("click",deleteText);
    document.getElementById("textPrevBtn").addEventListener("click",()=>moveText(-1));
    document.getElementById("textNextBtn").addEventListener("click",()=>moveText(1));
    document.getElementById("saveEditTextBtn").addEventListener("click",saveEditText);

    document.getElementById("photoPrevBtn").addEventListener("click",()=>movePhoto(-1));
    document.getElementById("photoNextBtn").addEventListener("click",()=>movePhoto(1));
    document.getElementById("deletePhotoBtn").addEventListener("click",deletePhoto);

    document.querySelectorAll(".closeModal").forEach(btn=>btn.addEventListener("click",closeAll));
    document.querySelectorAll(".modal").forEach(modal=>{
      modal.addEventListener("click",e=>{if(e.target===modal)closeAll()});
    });
  }

  document.addEventListener("DOMContentLoaded",()=>{
    load();
    bindUI();
    updateCatUI();
    renderText();
    renderPhotos();
  });
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js?v=photo-fix-v2");
  });
}
</script>
</body>
</html>
