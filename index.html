<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#202029" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Collection" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>One Tool｜Minimal API Style</title>
    <style>
    :root{
      --bg:#202029;
      --panel:#2c2c36;
      --panel2:#383842;
      --line:#555660;
      --line2:#6b6c75;
      --text:#f4f4f5;
      --muted:#a3a3ad;
      --white:#ffffff;
      --danger:#ff6b6b;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.06), transparent 34%),
        linear-gradient(180deg,#202029,#1b1b23);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Noto Sans TC","PingFang TC",sans-serif;
      padding:calc(28px + env(safe-area-inset-top)) 24px calc(30px + env(safe-area-inset-bottom));
    }
    header{
      max-width:620px;
      margin:0 auto;
      text-align:center;
      padding:0 0 26px;
    }
    .eyebrow{display:none}
    h1{
      margin:0;
      font-size:38px;
      line-height:1.12;
      letter-spacing:-.8px;
      font-weight:300;
      color:#f1f1f3;
    }
    h1 br{display:none}
    h1::after{
      content:"";
      display:block;
      width:82px;
      height:6px;
      border-radius:999px;
      background:#777781;
      margin:14px auto 0;
      opacity:.9;
    }
    .gray{color:inherit}
    .lead{
      display:none;
    }
    .tabs{
      max-width:560px;
      margin:50px auto 0;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.14);
      border-radius:30px;
      padding:30px;
      box-shadow:0 22px 60px rgba(0,0,0,.22);
    }
    button{
      border:1px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.045);
      color:#f3f3f5;
      border-radius:999px;
      padding:14px 22px;
      font-size:16px;
      font-weight:700;
      min-height:52px;
      letter-spacing:.5px;
    }
    button:active{transform:scale(.985)}
    .tab.active,.primary{
      background:#fff;
      color:#111;
      border-color:#fff;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    main{
      max-width:620px;
      margin:0 auto;
    }
    .tool{
      padding-top:0;
      margin-top:0;
    }
    .panel{display:none}
    .panel.active{display:block}
    input,textarea{
      width:100%;
      border:1px solid rgba(255,255,255,.22);
      border-radius:20px;
      padding:18px 20px;
      font-size:17px;
      outline:none;
      background:rgba(255,255,255,.075);
      color:#fff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }
    input::placeholder,textarea::placeholder{color:#94949f}
    input:focus,textarea:focus{
      border-color:rgba(255,255,255,.46);
      background:rgba(255,255,255,.10);
    }
    textarea{
      min-height:118px;
      resize:vertical;
      line-height:1.55;
    }
    .card{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.14);
      border-radius:30px;
      padding:30px;
      margin:22px 0;
      box-shadow:0 22px 60px rgba(0,0,0,.22);
    }
    label{
      display:block;
      color:#b7b7bf;
      font-size:14px;
      margin-bottom:10px;
      font-weight:500;
    }
    .prompt-segment{
      border:1px solid rgba(255,255,255,.14);
      border-radius:30px;
      padding:16px;
      margin:0 0 22px;
      display:flex;
      gap:10px;
      background:rgba(255,255,255,.045);
      overflow-x:auto;
      scrollbar-width:none;
      box-shadow:0 22px 60px rgba(0,0,0,.22);
    }
    .prompt-segment::-webkit-scrollbar{display:none}
    .prompt-item{
      min-height:52px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.055);
      border-radius:999px;
      padding:14px 24px;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      color:#d7d7dc;
    }
    .prompt-item:first-child{
      background:#fff;
      color:#111;
      border-color:#fff;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .prompt-title{
      font-size:16px;
      font-weight:700;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .prompt-item::after{display:none}
    .photo-section-title{
      display:none;
    }
    .thumb-grid{
      border:1px solid rgba(255,255,255,.14);
      border-radius:30px;
      padding:16px;
      margin:0 0 22px;
      display:flex;
      gap:12px;
      background:rgba(255,255,255,.045);
      overflow-x:auto;
      scrollbar-width:none;
      box-shadow:0 22px 60px rgba(0,0,0,.22);
    }
    .thumb-grid::-webkit-scrollbar{display:none}
    .thumb{
      position:relative;
      width:64px;
      height:64px;
      flex:0 0 64px;
      border-radius:22px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
    }
    .thumb:first-child{
      box-shadow:0 0 0 4px #fff;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .thumb-name{display:none}
    .empty{
      color:#a3a3ad;
      text-align:center;
      padding:32px 10px;
      font-size:16px;
    }
    .hint{
      color:#b7b7bf;
      font-size:14px;
      line-height:1.55;
      margin-top:12px;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .danger{
      color:#fff;
      border-color:rgba(255,107,107,.45);
      background:rgba(255,107,107,.14);
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:calc(26px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:#fff;
      color:#111;
      border-radius:999px;
      padding:12px 20px;
      display:none;
      z-index:99;
      font-weight:700;
      box-shadow:0 18px 42px rgba(0,0,0,.28);
    }
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.50);
      display:none;
      align-items:flex-end;
      z-index:50;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .sheet{
      width:100%;
      background:#24242d;
      border:1px solid rgba(255,255,255,.12);
      border-radius:30px 30px 0 0;
      padding:22px 18px calc(22px + env(safe-area-inset-bottom));
      max-height:88vh;
      overflow:auto;
    }
    .preview{
      width:100%;
      max-height:42vh;
      object-fit:contain;
      background:#1b1b23;
      border-radius:24px;
      margin:14px 0 16px;
      border:1px solid rgba(255,255,255,.12);
    }
    .small{
      color:#b7b7bf;
      font-size:14px;
      line-height:1.5;
    }
    @media(max-width:640px){
      body{padding-left:18px;padding-right:18px}
      h1{font-size:38px}
      .tabs{margin-top:46px;padding:30px;grid-template-columns:1fr 1fr}
      .card{padding:28px}
      .prompt-segment,.thumb-grid{padding:14px}
    }
  </style>
</head>
<body>
<header>
  <div class="eyebrow">For creators</div>
  <h1>My Collection</h1>
  <div class="lead">
    Text, prompts, images, and reusable assets — all through a single quick-access workspace.
  </div>
  <div class="tabs">
    <button id="tabText" class="tab active" onclick="showPanel('text')">文字</button>
    <button id="tabPhoto" class="tab" onclick="showPanel('photo')">圖片</button>
  </div>
</header>

<main>
  <section class="tool">
    <section id="panelText" class="panel active">
      <div id="textList"></div>

      <div class="card">
        <label>輸入標題</label>
        <input id="textTitle" placeholder="例如：Q版範本G、客戶回覆、VBA片段" />
        <br><br>
        <label>輸入短語</label>
        <textarea id="textBody" placeholder="輸入短語..."></textarea>
        <br><br>
        <button class="primary" onclick="addTextItem()">儲存文字</button>
      </div>
    </section>

    <section id="panelPhoto" class="panel">
      <div class="photo-section-title">圖片</div>
      <div id="photoGrid" class="thumb-grid"></div>
      <div id="photoEmpty" class="empty">尚未加入照片</div>

      <div class="card">
        <label>新增圖片</label>
        <input id="photoInput" type="file" accept="image/*" multiple onchange="addPhotos(event)" />
        <div class="hint">點圖片可直接分享，長按圖片可刪除。</div>
      </div>
    </section>
  </section>
</main>

<div id="toast" class="toast">完成</div>

<div id="photoModal" class="modal" onclick="closePhotoModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2 id="modalTitle" style="margin:4px 0 0;font-size:24px;font-weight:560;">Image</h2>
    <div class="small">可直接分享到 LINE，或儲存到相簿後再使用。</div>
    <img id="modalImg" class="preview" />
    <div class="row">
      <button class="primary" onclick="shareCurrentPhoto()">Share</button>
      <button onclick="downloadCurrentPhoto()">Save</button>
    </div>
    <br>
    <button class="danger" onclick="deleteCurrentPhoto()">Delete</button>
    <br><br>
    <button onclick="hideModal()">Close</button>
  </div>
</div>

<script>
const DB_NAME = "quick_material_tool_openai_style_db";
const DB_VERSION = 1;
let db;
let currentPhoto = null;

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display = "none", 1300);
}

function showPanel(type){
  document.getElementById("panelText").classList.toggle("active", type === "text");
  document.getElementById("panelPhoto").classList.toggle("active", type === "photo");
  document.getElementById("tabText").classList.toggle("active", type === "text");
  document.getElementById("tabPhoto").classList.toggle("active", type === "photo");
}

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      db = e.target.result;
      if(!db.objectStoreNames.contains("texts")) db.createObjectStore("texts", {keyPath:"id"});
      if(!db.objectStoreNames.contains("photos")) db.createObjectStore("photos", {keyPath:"id"});
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function tx(store, mode="readonly"){ return db.transaction(store, mode).objectStore(store); }
function getAll(store){
  return new Promise((resolve, reject)=>{
    const req = tx(store).getAll();
    req.onsuccess = ()=> resolve(req.result || []);
    req.onerror = ()=> reject(req.error);
  });
}
function put(store, value){
  return new Promise((resolve, reject)=>{
    const req = tx(store, "readwrite").put(value);
    req.onsuccess = ()=> resolve();
    req.onerror = ()=> reject(req.error);
  });
}
function del(store, id){
  return new Promise((resolve, reject)=>{
    const req = tx(store, "readwrite").delete(id);
    req.onsuccess = ()=> resolve();
    req.onerror = ()=> reject(req.error);
  });
}

async function addTextItem(){
  const title = document.getElementById("textTitle").value.trim();
  const body = document.getElementById("textBody").value.trim();
  if(!title || !body){ toast("請輸入標題與內容"); return; }
  await put("texts", { id:"t_"+Date.now(), title, body, createdAt:Date.now() });
  document.getElementById("textTitle").value = "";
  document.getElementById("textBody").value = "";
  toast("已新增");
  renderTextItems();
}

async function renderTextItems(){
  const q = "";
  const list = document.getElementById("textList");
  const items = (await getAll("texts"))
    .sort((a,b)=> b.createdAt - a.createdAt)
    .filter(x => !q || x.title.toLowerCase().includes(q) || x.body.toLowerCase().includes(q));

  if(items.length === 0){
    list.innerHTML = `<div class="empty">尚未加入常用文字</div>`;
    return;
  }

  list.innerHTML = `
    <div class="prompt-segment">
      ${items.map(item => `
        <div class="prompt-item"
          onclick="copyText('${item.id}')"
          oncontextmenu="showDeleteConfirm(event,'${item.id}')">
          <div class="prompt-title">${escapeHtml(item.title)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

async function copyText(id){
  const items = await getAll("texts");
  const item = items.find(x => x.id === id);
  if(!item) return;
  await navigator.clipboard.writeText(item.body);
  toast("已複製");
}

function showDeleteConfirm(event,id){
  event.preventDefault();
  if(confirm("要刪除這筆文字嗎？")) deleteText(id);
}

async function deleteText(id){
  await del("texts", id);
  toast("已刪除");
  renderTextItems();
}

async function addPhotos(event){
  const files = Array.from(event.target.files || []);
  if(files.length === 0) return;
  for(const file of files){
    const dataUrl = await fileToDataURL(file);
    await put("photos", {
      id:"p_"+Date.now()+"_"+Math.random().toString(36).slice(2),
      name:file.name || "image",
      type:file.type || "image/jpeg",
      dataUrl,
      createdAt:Date.now()
    });
  }
  event.target.value = "";
  toast("已加入照片");
  renderPhotos();
}

function fileToDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function renderPhotos(){
  const q = "";
  const grid = document.getElementById("photoGrid");
  const empty = document.getElementById("photoEmpty");
  const photos = (await getAll("photos"))
    .sort((a,b)=> b.createdAt - a.createdAt)
    .filter(x => !q || x.name.toLowerCase().includes(q));

  empty.style.display = photos.length ? "none" : "block";
  grid.innerHTML = photos.map(p => `
    <div class="thumb"
      onclick="sharePhotoById('${p.id}')"
      oncontextmenu="showPhotoDeleteConfirm(event,'${p.id}')">
      <img src="${p.dataUrl}" alt="${escapeHtml(p.name)}">
      <div class="thumb-name">${escapeHtml(p.name)}</div>
    </div>
  `).join("");
}


async function sharePhotoById(id){
  const photos = await getAll("photos");
  const photo = photos.find(x => x.id === id);
  if(!photo) return;
  await sharePhotoObject(photo);
}

function showPhotoDeleteConfirm(event,id){
  event.preventDefault();
  if(confirm("要刪除這張照片嗎？")){
    deletePhotoById(id);
  }
}

async function deletePhotoById(id){
  await del("photos", id);
  toast("已刪除");
  renderPhotos();
}

async function sharePhotoObject(photo){
  try{
    const file = dataURLToFile(photo.dataUrl, photo.name, photo.type);
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title: photo.name,
        files: [file]
      });
      toast("已開啟分享");
    }else if(navigator.share){
      await navigator.share({ title: photo.name });
    }else{
      toast("此瀏覽器不支援分享");
    }
  }catch(err){
    console.log(err);
    toast("分享已取消或失敗");
  }
}

async function openPhoto(id){
  const photos = await getAll("photos");
  currentPhoto = photos.find(x => x.id === id);
  if(!currentPhoto) return;
  document.getElementById("modalTitle").textContent = currentPhoto.name;
  document.getElementById("modalImg").src = currentPhoto.dataUrl;
  document.getElementById("photoModal").style.display = "flex";
}

function hideModal(){
  document.getElementById("photoModal").style.display = "none";
  currentPhoto = null;
}

function closePhotoModal(e){
  if(e.target.id === "photoModal") hideModal();
}

async function shareCurrentPhoto(){
  if(!currentPhoto) return;
  await sharePhotoObject(currentPhoto);
}

function dataURLToFile(dataUrl, filename, mimeType){
  const arr = dataUrl.split(",");
  const mime = mimeType || (arr[0].match(/:(.*?);/) || [])[1] || "image/jpeg";
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--) u8arr[n] = bstr.charCodeAt(n);
  return new File([u8arr], filename || "image.jpg", {type:mime});
}

function downloadCurrentPhoto(){
  if(!currentPhoto) return;
  const a = document.createElement("a");
  a.href = currentPhoto.dataUrl;
  a.download = currentPhoto.name || "image.jpg";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function deleteCurrentPhoto(){
  if(!currentPhoto) return;
  await del("photos", currentPhoto.id);
  hideModal();
  toast("已刪除");
  renderPhotos();
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

(async function init(){
  await openDB();
  renderTextItems();
  renderPhotos();
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(console.error);
  });
}
</script>
</body>
</html>
