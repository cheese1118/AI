<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Collection">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>My Collection Full Test</title>

<style>
:root{
  --bg:#ffffff;
  --text:#050505;
  --muted:#7d838c;
  --line:#dededb;
  --soft:#f7f7f5;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  min-height:100vh;
  background:#ffffff;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","PingFang TC","Noto Sans TC",sans-serif;
  padding:calc(30px + env(safe-area-inset-top)) 22px calc(34px + env(safe-area-inset-bottom));
}
.wrap{
  max-width:720px;
  margin:0 auto;
}
h1{
  text-align:center;
  font-size:clamp(64px,14vw,112px);
  line-height:.9;
  font-weight:500;
  letter-spacing:-6px;
  margin:0;
  color:#050505;
}
.line{
  display:none;
}
.subtitle{
  text-align:center;
  color:#7d838c;
  font-size:clamp(20px,4vw,28px);
  line-height:1.4;
  margin:28px 0 42px;
  font-weight:400;
  letter-spacing:-.6px;
}
.tabs{
  max-width:520px;
  margin:0 auto 28px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  padding:6px;
  border:1px solid #dededb;
  border-radius:999px;
  background:#ffffff;
}
.tab{
  border:none;
  border-radius:999px;
  min-height:48px;
  background:transparent;
  color:#9ca3af;
  font-size:18px;
  font-weight:500;
}
.tab.active{
  background:#050505;
  color:#ffffff;
}
.demo-count{
  text-align:center;
  color:#a1a1aa;
  font-size:14px;
  margin:0 0 24px;
}
.panel{display:none}
.panel.active{display:block}
.section{
  background:#ffffff;
  border:1px solid #e5e5e1;
  border-radius:30px;
  padding:18px;
  margin-bottom:24px;
  box-shadow:0 8px 30px rgba(0,0,0,.04);
}
.category-tabs{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  padding:5px;
  border:1px solid #dededb;
  border-radius:999px;
  background:#ffffff;
  margin-bottom:18px;
}
.category-tab{
  border:none;
  border-radius:999px;
  min-height:44px;
  background:transparent;
  color:#9ca3af;
  font-size:16px;
  font-weight:500;
}
.category-tab.active{
  background:#050505;
  color:#ffffff;
}
.segment{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  overflow:visible;
}
.copy-card{
  border:1px solid #dededb;
  background:#ffffff;
  color:#222;
  border-radius:999px;
  min-height:42px;
  padding:0 18px;
  flex:0 0 auto;
  font-size:15px;
  font-weight:500;
  transition:.15s ease;
  user-select:none;
  -webkit-user-select:none;
}
.copy-card:active,.photo-card:active{
  transform:scale(.97);
}
.copy-card.active{
  background:#050505;
  color:#ffffff;
  border-color:#050505;
}
.photo-row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  scrollbar-width:none;
  align-items:center;
}
.photo-row::-webkit-scrollbar{display:none}
.photo-card{
  appearance:none;
  -webkit-appearance:none;
  padding:0;
  margin:0;
  line-height:0;
  position:relative;
  width:86px;
  height:86px;
  flex:0 0 86px;
  border-radius:24px;
  overflow:hidden;
  border:none;
  background:#f1f1ee;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}
.photo-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}
label{
  display:block;
  color:#7d838c;
  font-size:15px;
  margin:0 0 10px;
  font-weight:400;
}
input,textarea,select{
  width:100%;
  border:1px solid #dededb;
  border-radius:22px;
  padding:16px 18px;
  font-size:17px;
  outline:none;
  background:#ffffff;
  color:#050505;
}
select option{color:#050505}
textarea{
  min-height:150px;
  resize:vertical;
  line-height:1.55;
}
input::placeholder,textarea::placeholder{color:#a1a1aa}
.btn{
  width:100%;
  border:1px solid #dededb;
  border-radius:999px;
  min-height:54px;
  font-size:17px;
  font-weight:500;
  background:#ffffff;
  color:#050505;
}
.btn.primary{
  background:#050505;
  color:#ffffff;
  border-color:#050505;
}
.btn.dark{
  background:#ffffff;
  color:#050505;
}
.btn.danger{
  background:#fff1f2;
  color:#991b1b;
  border-color:#fecaca;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(26px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  background:#050505;
  color:#ffffff;
  border-radius:999px;
  padding:12px 20px;
  font-weight:500;
  display:none;
  box-shadow:0 18px 42px rgba(0,0,0,.18);
  z-index:99;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.28);
  display:none;
  align-items:flex-end;
  z-index:50;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.sheet{
  width:100%;
  background:#ffffff;
  border:1px solid #e5e5e1;
  border-radius:30px 30px 0 0;
  padding:22px 18px calc(22px + env(safe-area-inset-bottom));
  max-height:88vh;
  overflow:auto;
}
.sheet h2{
  margin:0 0 18px;
  font-size:28px;
  font-weight:500;
  letter-spacing:-.8px;
  color:#050505;
}
.empty{
  color:#9ca3af;
  text-align:center;
  padding:24px 8px;
  font-size:16px;
}
.hint{
  color:#7d838c;
  line-height:1.7;
  font-size:14px;
  margin-top:14px;
}
@media(max-width:520px){
  h1{letter-spacing:-4px}
  .subtitle{margin-top:22px;margin-bottom:34px}
  .tab{font-size:16px}
  .section{border-radius:26px}
}
</style>

<style>
.copy-card,.photo-card{
touch-action:manipulation;
}
</style>

</head>

<body>
<div class="wrap">
  
<h1>Collection</h1>
  <div class="subtitle">Save text. Share images. Move as you grow.</div>

  <div class="tabs">
    <button class="tab active" id="textTab" onclick="showPanel('text')">文字</button>
    <button class="tab" id="photoTab" onclick="showPanel('photo')">圖片</button>
  </div>

  <section id="textPanel" class="panel active">
    <div class="section card-display-section">
      <div class="category-tabs">
        <button class="category-tab active" id="catCode" onclick="setCategory('code')">程式碼</button>
        <button class="category-tab" id="catGreeting" onclick="setCategory('greeting')">招呼碼</button>
        <button class="category-tab" id="catDialog" onclick="setCategory('dialog')">對話碼</button>
      </div>

      <div id="cardList" class="segment"></div>
      <div id="emptyText" class="empty">此類別尚未建立文字卡片</div>
    </div>

    <div style="height:90px;"></div>

    <div class="section">
      <label>新增至類別</label>
      <select id="categoryInput" class="select-input">
        <option value="code">程式碼</option>
        <option value="greeting">招呼碼</option>
        <option value="dialog">對話碼</option>
      </select>

      <br><br>

      <label>輸入標題</label>
      <input id="titleInput" placeholder="例如：Q版Prompt、LINE回覆、VBA" />
      <br><br>
      <label>輸入長文字內容</label>
      <textarea id="bodyInput" placeholder="這裡可以貼很長的文字內容，點卡片時會完整複製..."></textarea>
      <br><br>
      <button class="btn" onclick="addCard()">儲存文字卡片</button>
      <div class="hint">
        • 可選擇新增到「程式碼 / 招呼碼 / 對話碼」<br>
        • 點一下文字卡片：複製完整長文字<br>
        • 長按文字卡片 0.6 秒：可往前 / 往後調整排序
      </div>
    </div>
  </section>

  <section id="photoPanel" class="panel">
    <div class="section">
      <div id="photoList" class="photo-row"></div>
      <div id="emptyPhoto" class="empty">尚未加入圖片</div>
    </div>

    <div class="section">
      <label>新增圖片，可多選</label>
      <input id="photoInput" type="file" accept="image/*" multiple onchange="addPhotos(event)" />
      <div class="hint">
        • 點一下圖片：直接開啟分享，可分享到 LINE<br>
        • 長按圖片 0.6 秒：刪除圖片 / 調整順序
      </div>
    </div>
  </section>
</div>

<div id="toast" class="toast">已複製</div>

<div id="actionModal" class="modal" onclick="closeActionModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2 id="actionTitle">管理文字卡片</h2>
    <div class="row">
      <button class="btn" onclick="editCurrentCard()">修改</button>
      <button class="btn danger" onclick="showDeleteTextModal()">刪除</button>
    </div>
    <br>
    <div class="row">
      <button class="btn dark" onclick="moveCurrentText(-1)">往前</button>
      <button class="btn dark" onclick="moveCurrentText(1)">往後</button>
    </div>
    <br>
    <button class="btn dark" onclick="hideActionModal()">取消</button>
  </div>
</div>

<div id="editModal" class="modal" onclick="closeEditModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2>修改文字卡片</h2>
    <label>類別</label>
    <select id="editCategoryInput" class="select-input">
      <option value="code">程式碼</option>
      <option value="greeting">招呼碼</option>
      <option value="dialog">對話碼</option>
    </select>

    <br><br>

    <label>標題</label>
    <input id="editTitleInput" />
    <br><br>
    <label>長文字內容</label>
    <textarea id="editBodyInput"></textarea>
    <br><br>
    <button class="btn" onclick="saveEditCard()">儲存修改</button>
    <br><br>
    <button class="btn dark" onclick="hideEditModal()">取消</button>
  </div>
</div>

<div id="deleteTextModal" class="modal" onclick="closeDeleteTextModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2>確認刪除</h2>
    <div class="hint">確定要刪除「<span id="deleteTextTitle"></span>」這張文字卡片嗎？</div>
    <br>
    <button class="btn danger" onclick="confirmDeleteText()">確定刪除</button>
    <br><br>
    <button class="btn dark" onclick="hideDeleteTextModal()">取消</button>
  </div>
</div>

<div id="deletePhotoModal" class="modal" onclick="closeDeletePhotoModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2>管理圖片</h2>
    <div class="hint">可調整圖片順序，或刪除此圖片。</div>
    <br>
    <div class="row">
      <button class="btn dark" onclick="moveCurrentPhoto(-1)">往前</button>
      <button class="btn dark" onclick="moveCurrentPhoto(1)">往後</button>
    </div>
    <br>
    <button class="btn danger" onclick="confirmDeletePhoto()">刪除圖片</button>
    <br><br>
    <button class="btn dark" onclick="hideDeletePhotoModal()">取消</button>
  </div>
</div>

<script>
const TEXT_KEY = "collection_text_cards_v2";
const PHOTO_KEY = "collection_photos_v2";

let cards = [];
let photos = [];
let currentTextId = null;
let currentPhotoId = null;
let activeCategory = "code";
let longPressTimer = null;
let longPressTriggered = false;

function showPanel(type){
  document.getElementById("textPanel").classList.toggle("active", type === "text");
  document.getElementById("photoPanel").classList.toggle("active", type === "photo");
  document.getElementById("textTab").classList.toggle("active", type === "text");
  document.getElementById("photoTab").classList.toggle("active", type === "photo");
}

function loadAll(){
  try{ cards = JSON.parse(localStorage.getItem(TEXT_KEY) || "[]"); }catch(e){ cards = []; }
  try{ photos = JSON.parse(localStorage.getItem(PHOTO_KEY) || "[]"); }catch(e){ photos = []; }

  if(cards.length === 0){
    cards = [
      {id:"demo_1", category:"dialog", title:"Q版Prompt", body:"這是一段很長的 Q版 Prompt 範例文字。點擊卡片會完整複製這整段內容。"},
      {id:"demo_2", category:"greeting", title:"LINE回覆", body:"您好，已收到您的訊息，我這邊確認後會再回覆您，謝謝。"},
      {id:"demo_3", category:"code", title:"VBA範例", body:"Sub Test()\n    MsgBox \"Hello\"\nEnd Sub"}
    ];
    saveCards();
  }
}

function saveCards(){ localStorage.setItem(TEXT_KEY, JSON.stringify(cards)); }
function savePhotos(){ localStorage.setItem(PHOTO_KEY, JSON.stringify(photos)); }

function normalizeCards(){
  cards = cards.map(card => {
    if(!card.category) card.category = "code";
    return card;
  });
  saveCards();
}

function setCategory(category){
  activeCategory = category;
  document.getElementById("catCode").classList.toggle("active", category === "code");
  document.getElementById("catGreeting").classList.toggle("active", category === "greeting");
  document.getElementById("catDialog").classList.toggle("active", category === "dialog");
  renderCards();
}

function renderCards(){
  const list = document.getElementById("cardList");
  const empty = document.getElementById("emptyText");
  const filteredCards = cards.filter(card => (card.category || "code") === activeCategory);
  empty.style.display = filteredCards.length ? "none" : "block";
  list.innerHTML = filteredCards.map((card,index)=>`
    <button class="copy-card ${index === 0 ? "active" : ""}"
      ontouchstart="startTextLongPress(event,'${card.id}')"
      ontouchend="endLongPress(event)"
      ontouchmove="cancelLongPress()"
      onmousedown="startTextLongPress(event,'${card.id}')"
      onmouseup="endLongPress(event)"
      onmouseleave="cancelLongPress()"
      onclick="handleCardClick(event,'${card.id}')">
      ${escapeHtml(card.title)}
    </button>
  `).join("");
}

function renderPhotos(){
  const list = document.getElementById("photoList");
  const empty = document.getElementById("emptyPhoto");
  empty.style.display = photos.length ? "none" : "block";
  list.innerHTML = photos.map(photo=>`
    <button class="photo-card"
      ontouchstart="startPhotoLongPress(event,'${photo.id}')"
      ontouchend="endLongPress(event)"
      ontouchmove="cancelLongPress()"
      onmousedown="startPhotoLongPress(event,'${photo.id}')"
      onmouseup="endLongPress(event)"
      onmouseleave="cancelLongPress()"
      onclick="handlePhotoClick(event,'${photo.id}')">
      <img src="${photo.dataUrl}" alt="">
    </button>
  `).join("");
}

function addCard(){
  const title = document.getElementById("titleInput").value.trim();
  const body = document.getElementById("bodyInput").value;
  if(!title || !body.trim()){ toast("請輸入標題與內容"); return; }
  const category = document.getElementById("categoryInput").value;
  cards.unshift({id:"card_"+Date.now(), category, title, body});
  activeCategory = category;
  setCategory(category);
  saveCards();
  document.getElementById("titleInput").value = "";
  document.getElementById("bodyInput").value = "";
  renderCards();
  toast("已儲存");
}

function handleCardClick(event,id){
  if(longPressTriggered){
    event.preventDefault();
    longPressTriggered = false;
    return;
  }
  const card = cards.find(x=>x.id===id);
  if(!card) return;
  copyText(card.body);
  document.querySelectorAll(".copy-card").forEach(btn=>btn.classList.remove("active"));
  event.currentTarget.classList.add("active");
}

function startTextLongPress(event,id){
  longPressTriggered = false;
  currentTextId = id;
  clearTimeout(longPressTimer);
  longPressTimer = setTimeout(()=>{
    longPressTriggered = true;
    if(navigator.vibrate) navigator.vibrate(45);
    showActionModal(id);
  },600);
}

function showActionModal(id){
  currentTextId = id;
  const card = cards.find(x=>x.id===id);
  if(card) document.getElementById("actionTitle").textContent = card.title;
  document.getElementById("actionModal").style.display = "flex";
}
function hideActionModal(){ document.getElementById("actionModal").style.display = "none"; }
function closeActionModal(e){ if(e.target.id==="actionModal") hideActionModal(); }

function editCurrentCard(){
  const card = cards.find(x=>x.id===currentTextId);
  if(!card) return;
  document.getElementById("editCategoryInput").value = card.category || "code";
  document.getElementById("editTitleInput").value = card.title;
  document.getElementById("editBodyInput").value = card.body;
  hideActionModal();
  document.getElementById("editModal").style.display = "flex";
}
function hideEditModal(){ document.getElementById("editModal").style.display = "none"; }
function closeEditModal(e){ if(e.target.id==="editModal") hideEditModal(); }

function saveEditCard(){
  const card = cards.find(x=>x.id===currentTextId);
  if(!card) return;
  const title = document.getElementById("editTitleInput").value.trim();
  const body = document.getElementById("editBodyInput").value;
  if(!title || !body.trim()){ toast("請輸入標題與內容"); return; }
  card.title = title;
  card.body = body;
  saveCards();
  renderCards();
  hideEditModal();
  toast("已修改");
}

function showDeleteTextModal(){
  const card = cards.find(x=>x.id===currentTextId);
  if(!card) return;
  document.getElementById("deleteTextTitle").textContent = card.title;
  hideActionModal();
  document.getElementById("deleteTextModal").style.display = "flex";
}
function hideDeleteTextModal(){ document.getElementById("deleteTextModal").style.display = "none"; }
function closeDeleteTextModal(e){ if(e.target.id==="deleteTextModal") hideDeleteTextModal(); }
function confirmDeleteText(){
  cards = cards.filter(x=>x.id!==currentTextId);
  saveCards();
  renderCards();
  hideDeleteTextModal();
  toast("已刪除");
}


function moveCurrentText(direction){
  const index = cards.findIndex(x=>x.id===currentTextId);
  if(index < 0) return;

  const currentCategory = cards[index].category || "code";
  const sameCategory = cards
    .map((card, i)=>({card, i}))
    .filter(x=>(x.card.category || "code") === currentCategory);

  const pos = sameCategory.findIndex(x=>x.card.id === currentTextId);
  const target = sameCategory[pos + direction];

  if(!target){
    toast(direction < 0 ? "已在最前面" : "已在最後面");
    return;
  }

  const targetIndex = target.i;
  const temp = cards[index];
  cards[index] = cards[targetIndex];
  cards[targetIndex] = temp;

  saveCards();
  renderCards();
  renderCards();
  toast("已調整順序");
}

function addPhotos(event){
  const files = Array.from(event.target.files || []);
  if(!files.length) return;
  let pending = files.length;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      photos.unshift({
        id:"photo_"+Date.now()+"_"+Math.random().toString(36).slice(2),
        name:file.name || "image",
        type:file.type || "image/jpeg",
        dataUrl:reader.result
      });
      pending--;
      if(pending===0){
        savePhotos();
        renderPhotos();
        event.target.value = "";
        toast("已加入圖片");
      }
    };
    reader.readAsDataURL(file);
  });
}

function handlePhotoClick(event,id){
  if(longPressTriggered){
    event.preventDefault();
    longPressTriggered = false;
    return;
  }
  const photo = photos.find(x=>x.id===id);
  if(photo) sharePhoto(photo);
}

function startPhotoLongPress(event,id){
  longPressTriggered = false;
  currentPhotoId = id;
  clearTimeout(longPressTimer);
  longPressTimer = setTimeout(()=>{
    longPressTriggered = true;
    if(navigator.vibrate) navigator.vibrate(45);
    document.getElementById("deletePhotoModal").style.display = "flex";
  },600);
}

function hideDeletePhotoModal(){ document.getElementById("deletePhotoModal").style.display = "none"; }
function closeDeletePhotoModal(e){ if(e.target.id==="deletePhotoModal") hideDeletePhotoModal(); }

function moveCurrentPhoto(direction){
  const index = photos.findIndex(x=>x.id===currentPhotoId);
  if(index < 0) return;

  const targetIndex = index + direction;

  if(targetIndex < 0 || targetIndex >= photos.length){
    toast(direction < 0 ? "已在最前面" : "已在最後面");
    return;
  }

  const temp = photos[index];
  photos[index] = photos[targetIndex];
  photos[targetIndex] = temp;

  savePhotos();
  renderPhotos();
  renderCards();
  toast("已調整順序");
}

function confirmDeletePhoto(){
  photos = photos.filter(x=>x.id!==currentPhotoId);
  savePhotos();
  renderPhotos();
  hideDeletePhotoModal();
  toast("已刪除圖片");
}

function endLongPress(event){
  clearTimeout(longPressTimer);
  longPressTimer = null;
}
function cancelLongPress(){
  clearTimeout(longPressTimer);
  longPressTimer = null;
}

async function copyText(text){
  let success = false;
  try{
    await navigator.clipboard.writeText(text);
    success = true;
  }catch(err){}
  if(!success){
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly","");
    textarea.style.position = "fixed";
    textarea.style.top = "0";
    textarea.style.left = "-9999px";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    try{ success = document.execCommand("copy"); }catch(err){}
    document.body.removeChild(textarea);
  }
  if(success){
    if(navigator.vibrate) navigator.vibrate(30);
    toast("已複製完整內容");
  }else{
    alert("複製失敗，請手動選取文字");
  }
}

async function sharePhoto(photo){
  try{
    const file = dataURLToFile(photo.dataUrl, photo.name, photo.type);
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({title:photo.name, files:[file]});
      toast("已開啟分享");
    }else if(navigator.share){
      await navigator.share({title:photo.name});
    }else{
      toast("此瀏覽器不支援分享");
    }
  }catch(err){
    toast("分享已取消或失敗");
  }
}

function dataURLToFile(dataUrl, filename, mimeType){
  const arr = dataUrl.split(",");
  const mime = mimeType || (arr[0].match(/:(.*?);/) || [])[1] || "image/jpeg";
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--) u8arr[n] = bstr.charCodeAt(n);
  return new File([u8arr], filename || "image.jpg", {type:mime});
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(()=>{ t.style.display = "none"; },1300);
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
